name: coco_chair
task: caption_hallucination

paths:
  image_root: data/coco/val2014
  annotation_file: data/coco/annotations/instances_val2014.json
  caption_annotation_file: data/coco/annotations/captions_val2014.json
  split_file: null
  captions_file: null

validation:
  image_root: data/coco/train2017_val5000
  annotation_file: data/coco/annotations/instances_train2017.json
  caption_annotation_file: data/coco/annotations/captions_train2017.json
  split_file: configs/splits/coco_train2017_val5000_seed42.txt
  sample_size: 5000
  seed: 42

evaluation:
  metrics:
    - chairs
    - chairi
    - average_length
    - correct_object_coverage
    - hallucinated_object_removal
    - correct_object_retention
    - false_correction_rate
